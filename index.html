<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="记账">
  <title>记账</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, 'PingFang SC', sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    header {
      background: white;
      padding: 54px 20px 14px;
      border-bottom: 1px solid #e5e5ea;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left h1 { font-size: 22px; font-weight: 700; color: #1c1c1e; }
    .header-left .subtitle { font-size: 13px; color: #8e8e93; margin-top: 2px; }

    .export-btn {
      background: #007aff;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Input card */
    .input-card {
      background: white;
      margin: 16px;
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .main-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 17px;
      color: #1c1c1e;
      font-family: -apple-system, 'PingFang SC', sans-serif;
      background: transparent;
    }

    .main-input::placeholder { color: #c7c7cc; }

    .add-btn {
      background: #007aff;
      color: white;
      border: none;
      border-radius: 10px;
      width: 36px;
      height: 36px;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #aeaeb2;
      line-height: 1.6;
    }

    .hint span {
      display: inline-block;
      background: #f2f2f7;
      border-radius: 5px;
      padding: 1px 6px;
      margin: 1px 2px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
    }

    /* Error toast */
    .toast {
      position: fixed;
      top: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff3b30;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; }

    /* List */
    .list-wrap { margin: 0 16px; }

    .section-title {
      font-size: 13px;
      color: #8e8e93;
      padding: 4px 4px 8px;
      font-weight: 500;
    }

    .tx-card {
      background: white;
      border-radius: 14px;
      padding: 13px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    .tx-card.incomplete { border-left: 3px solid #ff9500; }

    .tx-desc { font-size: 15px; font-weight: 600; color: #1c1c1e; }
    .tx-meta { font-size: 12px; color: #8e8e93; margin-top: 3px; }
    .tx-meta .missing { color: #ff3b30; }

    .tx-right { text-align: right; flex-shrink: 0; margin-left: 10px; }
    .tx-amount { font-size: 17px; font-weight: 700; color: #ff3b30; }
    .tx-del { font-size: 11px; color: #c7c7cc; cursor: pointer; margin-top: 4px; }

    .empty-state {
      text-align: center;
      padding: 50px 0;
      color: #c7c7cc;
      font-size: 15px;
    }

    /* Export modal */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: none;
      align-items: flex-end;
    }

    .modal-bg.show { display: flex; }

    .modal {
      background: white;
      width: 100%;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 44px;
    }

    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .modal p { font-size: 13px; color: #8e8e93; margin-bottom: 14px; line-height: 1.5; }

    .modal textarea {
      width: 100%;
      height: 200px;
      border: 1.5px solid #e5e5ea;
      border-radius: 12px;
      padding: 12px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      color: #3a3a3c;
      resize: none;
      line-height: 1.6;
    }

    .modal-btns { display: flex; gap: 10px; margin-top: 14px; }

    .btn-copy {
      flex: 1;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-clear-all {
      background: #ff3b30;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 15px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-close {
      background: #f2f2f7;
      color: #8e8e93;
      border: none;
      border-radius: 14px;
      padding: 15px 14px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>记账</h1>
    <div class="subtitle" id="subtitle"></div>
    <div style="font-size:11px;color:#aeaeb2;margin-top:2px;" id="syncStatus"></div>
  </div>
  <button class="export-btn" onclick="showExport()">导出 📋</button>
</header>

<div class="input-card">
  <div class="input-row">
    <input class="main-input" id="mainInput" type="text"
      placeholder="描述 金额 TNG/现金 类别 个人/家庭"
      autocomplete="off" autocorrect="off" autocapitalize="off"
      onkeydown="if(event.key==='Enter') addEntry()">
    <button class="add-btn" id="cancelBtn" onclick="cancelEdit()" style="display:none;background:#ff9500;">✕</button>
    <button class="add-btn" id="addBtn" onclick="addEntry()">+</button>
  </div>
  <div class="hint">
    例：午餐 15.50 TNG 饮食 个人<br>
    类别：<span>饮食</span><span>交通</span><span>购物</span><span>医疗</span><span>教育</span><span>水电</span><span>美容</span><span>课程</span><span>娱乐</span><span>其他</span><span>内部转账</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="list-wrap">
  <div class="section-title" id="listTitle"></div>
  <div id="txList"></div>
</div>

<!-- Setup modal -->
<div class="modal-bg" id="setupModal">
  <div class="modal">
    <h2>☁️ 云端同步设置</h2>
    <p>输入一次，数据就会在所有装置同步。资料存在你的手机，不会出现在源码里。</p>
    <div style="margin-bottom:10px;">
      <div style="font-size:12px;color:#8e8e93;margin-bottom:4px;">Bin ID</div>
      <input id="setupBin" type="text" placeholder="6a005ecc..." autocomplete="off"
        style="width:100%;border:1.5px solid #e5e5ea;border-radius:10px;padding:11px 12px;font-size:15px;outline:none;">
    </div>
    <div style="margin-bottom:16px;">
      <div style="font-size:12px;color:#8e8e93;margin-bottom:4px;">API Key</div>
      <input id="setupKey" type="password" placeholder="$2a$10$..." autocomplete="off"
        style="width:100%;border:1.5px solid #e5e5ea;border-radius:10px;padding:11px 12px;font-size:15px;outline:none;">
    </div>
    <button class="btn-copy" onclick="saveSetup()">确认</button>
  </div>
</div>

<!-- Export modal -->
<div class="modal-bg" id="modalBg" onclick="bgClick(event)">
  <div class="modal">
    <h2>导出记录</h2>
    <p>复制以下内容，月底连同 PDF 账单一起发给 Claude 处理</p>
    <textarea id="exportText" readonly></textarea>
    <div class="modal-btns">
      <button class="btn-close"     onclick="hideExport()">关闭</button>
      <button class="btn-clear-all" onclick="clearAll()">清空</button>
      <button class="btn-copy"      onclick="copyExport()">复制</button>
    </div>
  </div>
</div>

<script>
  // Categories match Google Sheets dropdown exactly
  const CATS = ['饮食','交通','购物','医疗','教育','水电','美容','课程','娱乐','其他','内部转账'];

  const catAlias = {
    // 饮食
    '饮食':'饮食','食物':'饮食','吃饭':'饮食','早餐':'饮食','午餐':'饮食','晚餐':'饮食','宵夜':'饮食','餐':'饮食','吃':'饮食',
    // 交通
    '交通':'交通','油费':'交通','汽油':'交通','停车':'交通',
    // 购物
    '购物':'购物','买':'购物',
    // 医疗
    '医疗':'医疗','医生':'医疗','买药':'医疗','诊所':'医疗','中医':'医疗','药':'医疗',
    // 教育
    '教育':'教育','补习':'教育','培训':'教育',
    // 水电
    '水电':'水电','电费':'水电','水费':'水电',
    // 美容
    '美容':'美容','facial':'美容','护肤':'美容',
    // 课程
    '课程':'课程',
    // 娱乐
    '娱乐':'娱乐','电影':'娱乐',
    // 内部转账
    '内部转账':'内部转账','转账':'内部转账',
    // 其他（最后匹配）
    '其他':'其他',
  };

  let BIN_ID  = localStorage.getItem('ww_bin_id')  || '';
  let API_KEY = localStorage.getItem('ww_api_key') || '';
  let API_URL = BIN_ID ? `https://api.jsonbin.io/v3/b/${BIN_ID}` : '';

  let txns = JSON.parse(localStorage.getItem('ww_txns') || '[]');
  let editIndex = -1;

  init();

  function init() {
    const now = new Date();
    document.getElementById('subtitle').textContent =
      `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')} · 现金 & TNG`;
    renderList();
    if (!BIN_ID || !API_KEY) {
      showSetup();
    } else {
      loadFromCloud();
      document.getElementById('mainInput').focus();
    }
  }

  /* ─── Setup modal ─── */
  function showSetup() {
    document.getElementById('setupModal').classList.add('show');
  }

  function saveSetup() {
    const b = document.getElementById('setupBin').value.trim();
    const k = document.getElementById('setupKey').value.trim();
    if (!b || !k) { alert('请填写两个字段'); return; }
    BIN_ID  = b;
    API_KEY = k;
    API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
    localStorage.setItem('ww_bin_id',  BIN_ID);
    localStorage.setItem('ww_api_key', API_KEY);
    document.getElementById('setupModal').classList.remove('show');
    loadFromCloud();
    document.getElementById('mainInput').focus();
  }

  /* ─── Cloud sync ─── */
  function setSyncStatus(state) {
    const el = document.getElementById('syncStatus');
    const map = { syncing:'⏳ 同步中…', ok:'☁️ 已同步', err:'⚠️ 离线' };
    el.textContent = map[state] || '';
  }

  async function loadFromCloud() {
    setSyncStatus('syncing');
    try {
      const res = await fetch(API_URL, { headers: { 'X-Master-Key': API_KEY } });
      const data = await res.json();
      txns = data.record.txns || [];
      localStorage.setItem('ww_txns', JSON.stringify(txns));
      renderList();
      setSyncStatus('ok');
    } catch(e) {
      setSyncStatus('err');
    }
  }

  async function saveToCloud() {
    setSyncStatus('syncing');
    try {
      await fetch(API_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
        body: JSON.stringify({ txns })
      });
      setSyncStatus('ok');
    } catch(e) {
      setSyncStatus('err');
    }
  }

  /* ─── Parse & Add / Save Edit ─── */
  function addEntry() {
    const raw = document.getElementById('mainInput').value.trim();
    if (!raw) return;

    const entry = parse(raw);

    if (!entry.description && entry.amount == null) {
      showToast('请输入描述和金额');
      return;
    }

    if (editIndex >= 0) {
      txns[editIndex] = { ...txns[editIndex], ...entry };
      editIndex = -1;
      document.getElementById('addBtn').textContent = '+';
      document.getElementById('cancelBtn').style.display = 'none';
    } else {
      txns.push({ ...entry, date: new Date().toISOString() });
    }

    persist();
    renderList();
    document.getElementById('mainInput').value = '';
    document.getElementById('mainInput').focus();
  }

  function editTx(i) {
    const tx = txns[i];
    const parts = [
      tx.description,
      tx.amount != null ? tx.amount : '',
      tx.paymentMethod,
      tx.category,
      tx.classify,
    ].filter(Boolean).join(' ');

    document.getElementById('mainInput').value = parts;
    document.getElementById('mainInput').focus();
    editIndex = i;
    document.getElementById('addBtn').textContent = '✓';
    document.getElementById('cancelBtn').style.display = 'inline-flex';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    editIndex = -1;
    document.getElementById('mainInput').value = '';
    document.getElementById('addBtn').textContent = '+';
    document.getElementById('cancelBtn').style.display = 'none';
    document.getElementById('mainInput').focus();
  }

  function parse(text) {
    let s = text;

    // Amount: first number found
    const amtM = s.match(/(\d+(?:[.,]\d+)?)/);
    const amount = amtM ? parseFloat(amtM[1].replace(',', '.')) : null;
    if (amtM) s = s.replace(amtM[0], ' ');

    // Payment method
    let paymentMethod = null;
    if (/tng|touch/i.test(s)) { paymentMethod = 'TNG'; s = s.replace(/tng|touch[\w\s']*go/gi, ' '); }
    else if (/现金|cash/i.test(s)) { paymentMethod = '现金'; s = s.replace(/现金|cash/gi, ' '); }

    // Category — longest match first
    let category = null;
    const catKeys = Object.keys(catAlias).sort((a,b) => b.length - a.length);
    for (const key of catKeys) {
      if (s.includes(key)) { category = catAlias[key]; s = s.replace(key, ' '); break; }
    }

    // Classify
    let classify = null;
    if (/家庭/i.test(s)) { classify = '家庭'; s = s.replace(/家庭/gi, ' '); }
    else if (/个人/i.test(s)) { classify = '个人'; s = s.replace(/个人/gi, ' '); }

    // Remaining = description
    const description = s.replace(/\s{2,}/g, ' ').trim();

    return { description, amount, paymentMethod, category, classify };
  }

  /* ─── List ─── */
  function renderList() {
    const list  = document.getElementById('txList');
    const title = document.getElementById('listTitle');

    if (!txns.length) {
      list.innerHTML = '<div class="empty-state">还没有记录</div>';
      title.textContent = '';
      return;
    }

    title.textContent = `本月记录 ${txns.length} 笔`;

    list.innerHTML = [...txns].reverse().map((tx, ri) => {
      const i   = txns.length - 1 - ri;
      const d   = new Date(tx.date);
      const ds  = `${d.getMonth()+1}/${d.getDate()}`;
      const cat = tx.category || null;

      const incomplete = !tx.paymentMethod || !tx.category || !tx.classify;

      const metaParts = [
        ds,
        tx.paymentMethod ? tx.paymentMethod : '<span class="missing">付款方式?</span>',
        cat              ? cat              : '<span class="missing">类别?</span>',
        tx.classify      ? tx.classify      : '<span class="missing">个人/家庭?</span>',
      ];

      return `<div class="tx-card${incomplete ? ' incomplete' : ''}">
        <div>
          <div class="tx-desc">${tx.description || '（无描述）'}</div>
          <div class="tx-meta">${metaParts.join(' · ')}</div>
        </div>
        <div class="tx-right">
          <div class="tx-amount">RM ${tx.amount != null ? tx.amount.toFixed(2) : '?'}</div>
          <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px;">
            <span class="tx-del" onclick="editTx(${i})">编辑</span>
            <span class="tx-del" onclick="deleteTx(${i})">删除</span>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function deleteTx(i) {
    if (!confirm('删除这笔记录？')) return;
    txns.splice(i, 1);
    persist();
    renderList();
  }

  function persist() {
    localStorage.setItem('ww_txns', JSON.stringify(txns));
    saveToCloud();
  }

  /* ─── Toast ─── */
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  /* ─── Export ─── */
  function showExport() {
    if (!txns.length) { alert('还没有记录'); return; }

    const now   = new Date();
    const month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

    const lines = [
      `【现金/TNG 手动记录】${month}`,
      '| 日期 | 描述 | 金额(RM) | 付款方式 | 类别 | 分类 | 收支 | 备注 |',
      '|------|------|---------|---------|------|------|------|------|',
      ...txns.map(tx => {
        const d  = new Date(tx.date);
        const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        const amt = tx.amount != null ? tx.amount.toFixed(2) : '?';
        return `| ${ds} | ${tx.description || ''} | ${amt} | ${tx.paymentMethod || ''} | ${tx.category || ''} | ${tx.classify || ''} | 支出 | |`;
      })
    ];

    document.getElementById('exportText').value = lines.join('\n');
    document.getElementById('modalBg').classList.add('show');
  }

  function bgClick(e) { if (e.target === document.getElementById('modalBg')) hideExport(); }
  function hideExport() { document.getElementById('modalBg').classList.remove('show'); }

  function copyExport() {
    navigator.clipboard.writeText(document.getElementById('exportText').value).then(() => {
      const btn = document.querySelector('.btn-copy');
      btn.textContent = '已复制 ✓';
      setTimeout(() => btn.textContent = '复制', 2000);
    }).catch(() => {
      document.getElementById('exportText').select();
      document.execCommand('copy');
    });
  }

  function clearAll() {
    if (!confirm(`删除全部 ${txns.length} 笔记录？此操作无法恢复`)) return;
    txns = [];
    persist();
    renderList();
    hideExport();
  }
</script>
</body>
</html>
